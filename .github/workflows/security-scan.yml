name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Weekly scheduled scan to catch newly disclosed CVEs.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  # -------------------------------------------------------------------------
  # Scan Dockerfiles with Hadolint (Dockerfile best practices)
  # -------------------------------------------------------------------------
  hadolint:
    name: Hadolint – Dockerfile lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run hadolint on build Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: stack/build/Dockerfile
          format: sarif
          output-file: hadolint-build.sarif

      - name: Run hadolint on run Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: stack/run/Dockerfile
          format: sarif
          output-file: hadolint-run.sarif

      - name: Upload hadolint SARIF (build image)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: hadolint-build.sarif
          category: hadolint-build

      - name: Upload hadolint SARIF (run image)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: hadolint-run.sarif
          category: hadolint-run

  # -------------------------------------------------------------------------
  # Trivy – filesystem / IaC scan (builder.toml, Dockerfiles, workflows)
  # -------------------------------------------------------------------------
  trivy-fs:
    name: Trivy – filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          github-pat: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy SARIF – filesystem
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # -------------------------------------------------------------------------
  # Trivy – container image scan (build stack image)
  # -------------------------------------------------------------------------
  trivy-image-build:
    name: Trivy – build stack image scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build build stack image (local)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./stack/build
          load: true
          tags: distroless-buildpack-builder/build:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan build stack image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          scan-ref: distroless-buildpack-builder/build:scan
          format: sarif
          output: trivy-build-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          github-pat: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy SARIF – build stack image
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: trivy-build-image.sarif
          category: trivy-build-image

  # -------------------------------------------------------------------------
  # Trivy – container image scan (run stack image)
  # -------------------------------------------------------------------------
  trivy-image-run:
    name: Trivy – run stack image scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build run stack image (local)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./stack/run
          load: true
          tags: distroless-buildpack-builder/run:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan run stack image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          scan-ref: distroless-buildpack-builder/run:scan
          format: sarif
          output: trivy-run-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          github-pat: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy SARIF – run stack image
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: trivy-run-image.sarif
          category: trivy-run-image
