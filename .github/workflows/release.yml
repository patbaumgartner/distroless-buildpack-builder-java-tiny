name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  IMAGE_BASE: ghcr.io/patbaumgartner/distroless-buildpack-builder-java-tiny

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "${PREV_TAG}" ]]; then
            LOG=$(git log --oneline "${PREV_TAG}..HEAD" 2>/dev/null || git log --oneline)
          else
            LOG=$(git log --oneline)
          fi
          {
            echo "changelog<<EOF"
            echo "${LOG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          generate_release_notes: true
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Docker Images

            ### Builder
            ```
            docker pull ${{ env.IMAGE_BASE }}:${{ github.ref_name }}
            ```

            ### Stack Images
            ```
            docker pull ${{ env.IMAGE_BASE }}/build:${{ github.ref_name }}
            docker pull ${{ env.IMAGE_BASE }}/run:${{ github.ref_name }}
            ```

            ## Usage

            ```bash
            pack build my-app \
              --builder ${{ env.IMAGE_BASE }}:${{ github.ref_name }}
            ```
