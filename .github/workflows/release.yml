name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  IMAGE_BASE: ghcr.io/patbaumgartner/distroless-buildpack-builder-java-tiny

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "${PREV_TAG}" ]]; then
            LOG=$(git log --oneline "${PREV_TAG}..HEAD" 2>/dev/null || git log --oneline)
          else
            LOG=$(git log --oneline)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "${LOG}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Docker Images

            ### Builder
            ```
            docker pull ${{ env.IMAGE_BASE }}:${{ github.ref_name }}
            ```

            ### Stack Images
            ```
            docker pull ${{ env.IMAGE_BASE }}/build:${{ github.ref_name }}
            docker pull ${{ env.IMAGE_BASE }}/run:${{ github.ref_name }}
            ```

            ## Usage

            ```bash
            pack build my-app \
              --builder ${{ env.IMAGE_BASE }}:${{ github.ref_name }}
            ```
