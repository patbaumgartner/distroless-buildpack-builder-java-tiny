name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/patbaumgartner/distroless-buildpack-builder-java-tiny
  BUILDER_LOCAL_TAG: distroless-builder-java-tiny:ci

jobs:
  smoke-tests:
    name: Smoke tests – stack image labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build build stack image (local)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./stack/build
          load: true
          tags: ${{ env.IMAGE_BASE }}/build:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build run stack image (local)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./stack/run
          load: true
          tags: ${{ env.IMAGE_BASE }}/run:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate stack image labels
        run: bash tests/smoke/smoke_test.sh
        env:
          BUILD_IMAGE: ${{ env.IMAGE_BASE }}/build:test
          RUN_IMAGE: ${{ env.IMAGE_BASE }}/run:test

  integration-tests:
    name: Integration – build and run samples
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@c1c71086a0e89a65c04ea113390227fd7f05d9df # v6.0.0

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build build stack image (local)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./stack/build
          load: true
          tags: ${{ env.IMAGE_BASE }}/build:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build run stack image (local)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./stack/run
          load: true
          tags: ${{ env.IMAGE_BASE }}/run:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create builder locally
        run: |
          pack builder create "${{ env.BUILDER_LOCAL_TAG }}" \
            --config builder.toml \
            --pull-policy if-not-present

      - name: Build Java sample with pack
        run: |
          pack build distroless-test/java:ci \
            --path ./samples/java \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Java container and verify response
        run: |
          docker run -d --name java-test -p 8082:8080 distroless-test/java:ci
          for i in $(seq 1 30); do
            RESP=$(curl -sf http://localhost:8082/ 2>/dev/null || echo "")
            if echo "${RESP}" | grep -qi "hello"; then
              echo "Java app responded: ${RESP}"
              break
            fi
            echo "Waiting... (${i}/30)"
            sleep 3
          done
          echo "${RESP}" | grep -qi "hello"
          docker rm -f java-test

      - name: Build Java Native Image sample with pack
        run: |
          pack build distroless-test/java-native-image:ci \
            --path ./samples/java-native-image \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Java Native Image container and verify response
        run: |
          docker run -d --name java-native-test -p 8084:8080 distroless-test/java-native-image:ci
          sleep 5
          docker logs java-native-test 2>&1 || true
          for i in $(seq 1 30); do
            RESP=$(curl -sf http://localhost:8084/ 2>/dev/null || echo "")
            if echo "${RESP}" | grep -qi "hello"; then
              echo "Java Native Image app responded: ${RESP}"
              break
            fi
            echo "Waiting... (${i}/30)"
            sleep 3
          done
          echo "${RESP}" | grep -qi "hello"
          docker rm -f java-native-test

      - name: Build Spring Boot sample via mvn spring-boot:build-image
        working-directory: ./samples/java
        run: |
          mvn spring-boot:build-image \
            --no-transfer-progress \
            -Dmaven.test.skip=true \
            -Dspring-boot.build-image.imageName=distroless-test/java-mvn:ci \
            -Dspring-boot.build-image.pullPolicy=IF_NOT_PRESENT

      - name: Run Spring Boot (mvn-built) container and verify response
        run: |
          docker run -d --name java-mvn-test -p 8083:8080 distroless-test/java-mvn:ci
          for i in $(seq 1 30); do
            RESP=$(curl -sf http://localhost:8083/ 2>/dev/null || echo "")
            if echo "${RESP}" | grep -qi "hello"; then
              echo "Spring Boot (mvn) app responded: ${RESP}"
              break
            fi
            echo "Waiting... (${i}/30)"
            sleep 3
          done
          echo "${RESP}" | grep -qi "hello"
          docker rm -f java-mvn-test

