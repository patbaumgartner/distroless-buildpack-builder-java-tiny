name: Quality Gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: ./tests
          severity: warning

      - name: Install actionlint
        run: bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Run actionlint
        run: ./actionlint -color

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@db43aef879112c3119a410d69f66701e0d530809 # v19
        with:
          globs: "**/*.md"

  java-static-analysis:
    name: Java static analysis (${{ matrix.sample }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        sample: [java, java-native-image]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run OpenRewrite dry-run
        working-directory: ./samples/${{ matrix.sample }}
        run: mvn -B rewrite:dryRun --no-transfer-progress -Dmaven.test.skip=true

      - name: Run Checkstyle
        working-directory: ./samples/${{ matrix.sample }}
        run: mvn -B checkstyle:check --no-transfer-progress

      - name: Run tests
        working-directory: ./samples/${{ matrix.sample }}
        run: mvn -B test --no-transfer-progress
