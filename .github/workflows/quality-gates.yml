name: Quality Gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: ./tests
          severity: warning

      - name: Install actionlint
        run: bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Run actionlint
        run: ./actionlint -color

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: "**/*.md"

  java-static-analysis:
    name: Java static analysis (${{ matrix.sample }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REWRITE_PLUGIN_VERSION: "6.38.0"
      REWRITE_CONFIG_PATH: "${{ github.workspace }}/openrewrite/rewrite.yml"
    strategy:
      fail-fast: false
      matrix:
        sample: [java, java-native-image]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run OpenRewrite dry-run
        run: |
          mvn -B -f samples/${{ matrix.sample }}/pom.xml --no-transfer-progress \
            org.openrewrite.maven:rewrite-maven-plugin:${{ env.REWRITE_PLUGIN_VERSION }}:dryRun \
            -Drewrite.configLocation="${{ env.REWRITE_CONFIG_PATH }}" \
            -Drewrite.activeRecipes=com.patbaumgartner.CodeCleanup \
            -Dmaven.test.skip=true

      - name: Run Checkstyle
        working-directory: ./samples/${{ matrix.sample }}
        run: mvn -B checkstyle:check --no-transfer-progress

      - name: Run tests
        working-directory: ./samples/${{ matrix.sample }}
        run: mvn -B test --no-transfer-progress
